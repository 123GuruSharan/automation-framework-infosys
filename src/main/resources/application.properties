spring.application.name=framework

# Screenshots (UI failures); relative to working directory unless absolute
automation.screenshots.dir=screenshots

# Server
server.port=8080

# MySQL — database: automation_framework (ensure MySQL is running and DB exists or user has CREATE privilege)
spring.datasource.url=jdbc:mysql://localhost:3306/automation_framework?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=guru123

# JPA — let Spring Boot / Hibernate auto-detect dialect from the JDBC URL (do not set spring.jpa.database-platform or hibernate.dialect here)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Scheduler polling interval in ms (checks due cron schedules)
automation.scheduler.poll-ms=30000

# One-time demo data: empty DB only — creates "E2E Demo Suite" + 2 API test cases (see DemoSeedService)
automation.demo.seed=false

# Point-to-point email alerts (set spring.mail.host + automation.mail.to; then automation.mail.enabled=true)
automation.mail.enabled=false
automation.mail.from=
automation.mail.to=
# Example when enabling mail:
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=you@gmail.com
# spring.mail.password=app-password
